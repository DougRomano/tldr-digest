<label>
  <input type="checkbox"
         {% if issue.reviewed %}checked{% endif %}
         hx-post="/inbox/{{ issue.id }}/review"
         hx-target="#rev-{{ issue.id }}"
         hx-swap="innerHTML"/>
  <span style="color:#64748b;font-size:11px">
    {% if issue.reviewed_at %}{{ issue.reviewed_at | short_date }}{% endif %}
  </span>
</label>
